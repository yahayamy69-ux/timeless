<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Montserrat:wght@200;300&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a0a; display:flex; align-items:center; justify-content:center; min-height:100vh; }
</style>
</head>
<body>
<div style="background:#0a0a0a;padding:60px 32px;display:flex;align-items:center;justify-content:center;width:100%;position:relative;overflow:hidden">

  <div style="position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(to right,transparent,#C9A84C,#f0d080,#C9A84C,transparent)"></div>
  <div style="position:absolute;bottom:0;left:0;right:0;height:0.5px;background:linear-gradient(to right,transparent,#C9A84C44,transparent)"></div>
  <div style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:300px;height:300px;border-radius:50%;border:0.5px solid rgba(201,168,76,0.08)"></div>
  <div style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:440px;height:440px;border-radius:50%;border:0.5px solid rgba(201,168,76,0.05)"></div>

  <div style="text-align:center;position:relative;z-index:2;width:100%">

    <div style="font-family:'Montserrat',sans-serif;font-size:8px;letter-spacing:0.55em;color:#8a7a56;text-transform:uppercase;font-weight:200;margin-bottom:18px">Est. 2023 &nbsp;·&nbsp; Abuja</div>

    <svg width="100%" viewBox="0 0 500 75" xmlns="http://www.w3.org/2000/svg" style="display:block;max-width:460px;margin:0 auto">
      <defs>
        <linearGradient id="gx" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#6b5218"/>
          <stop offset="20%" stop-color="#C9A84C"/>
          <stop offset="45%" stop-color="#f5df8a"/>
          <stop offset="65%" stop-color="#C9A84C"/>
          <stop offset="85%" stop-color="#f0d080"/>
          <stop offset="100%" stop-color="#9a7a30"/>
        </linearGradient>
      </defs>
      <text x="250" y="62" font-family="'Cormorant Garamond',Georgia,serif" font-size="62" font-weight="300" fill="url(#gx)" text-anchor="middle" letter-spacing="8">TIMELESS</text>
    </svg>

    <div style="display:flex;align-items:center;justify-content:center;gap:12px;margin-top:4px">
      <div style="height:0.5px;width:44px;background:linear-gradient(to right,transparent,#C9A84C)"></div>
      <div style="width:3px;height:3px;border-radius:50%;background:#C9A84C;opacity:0.6"></div>
      <div style="font-family:'Montserrat',sans-serif;font-size:9px;letter-spacing:0.55em;color:#C9A84C;text-transform:uppercase;font-weight:200">By Emjay</div>
      <div style="width:3px;height:3px;border-radius:50%;background:#C9A84C;opacity:0.6"></div>
      <div style="height:0.5px;width:44px;background:linear-gradient(to left,transparent,#C9A84C)"></div>
    </div>

    <div style="margin:18px auto 0;display:flex;align-items:center;justify-content:center">
      <svg width="110" height="14" viewBox="0 0 110 14">
        <line x1="0" y1="7" x2="32" y2="7" stroke="#C9A84C" stroke-width="0.5" opacity="0.2"/>
        <polygon points="42,7 48,3 54,7 48,11" fill="none" stroke="#C9A84C" stroke-width="0.5" opacity="0.7"/>
        <circle cx="55" cy="7" r="1.5" fill="#C9A84C" opacity="0.9"/>
        <polygon points="68,7 62,3 56,7 62,11" fill="none" stroke="#C9A84C" stroke-width="0.5" opacity="0.7"/>
        <line x1="78" y1="7" x2="110" y2="7" stroke="#C9A84C" stroke-width="0.5" opacity="0.2"/>
      </svg>
    </div>

    <div style="margin-top:16px;font-family:'Cormorant Garamond',Georgia,serif;font-size:13px;font-style:italic;font-weight:300;color:#8a7a56;letter-spacing:0.16em">Time never looked this good on you.</div>

  </div>
</div>
</body>
</html>
